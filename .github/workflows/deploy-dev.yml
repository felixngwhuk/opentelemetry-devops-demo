name: Deploy Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build_preparation:
    outputs:
      image_tag: ${{ steps.set_image_vars.outputs.image_tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Set image variables
        id: set_image_vars
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"
          echo "IMAGE_REPO=${REGISTRY}/${{ github.repository_owner }}/${IMAGE_NAME}" >> "$GITHUB_ENV"
          echo "image_tag=dev-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

  build_images:
    needs: build_preparation
    permissions:  # required by the reusable workflow
      contents: read
      packages: write
    uses: ./.github/workflows/component-build-images.yml
    with:
      version: ${{ needs.build_preparation.outputs.image_tag }}
      push: true
    secrets: inherit

  quality_checks:
    uses: ./.github/workflows/quality-checks.yml

  build-test:
    needs: [
      build_images,
      quality_checks
    ]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Report CI status
        shell: bash
        env:
          CI_SUCCESS: ${{ !contains(needs.*.result, 'failure') }}
        run: |
          if [ "${CI_SUCCESS}" == "true" ]
          then
            echo 'Build and Quality Checks completed ✓'
          else
            echo 'Build and Quality Checks failed ✗'
            exit 1
          fi
