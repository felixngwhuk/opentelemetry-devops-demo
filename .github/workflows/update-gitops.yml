name: Update GitOps

on:
  workflow_call:
    inputs:
      environment:
        description: GitOps overlay environment to update
        required: true
        type: string
      image_tag:
        description: Image tag to write into the GitOps kustomization
        required: true
        type: string
    secrets:
      gitops_repo_token:
        description: Token with write access to the GitOps repository
        required: true

permissions:
  contents: read

jobs:
  update-gitops:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ inputs.image_tag }}
      KUSTOMIZATION_FILE: apps/opentelemetry-demo/overlays/${{ inputs.environment }}/kustomization.yaml
      APP_IMAGE_NAME_REGEX: ^ghcr[.]io/felixngwhuk/opentelemetry-devops-demo/
      VERSION_LABEL_SELECTOR: app.kubernetes.io/part-of=opentelemetry-demo
      VERSION_LABEL_PATH: /metadata/labels/app.kubernetes.io~1version
    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v6.0.2
        with:
          repository: felixngwhuk/opentelemetry-devops-demo-gitops
          token: ${{ secrets.gitops_repo_token }}
          path: gitops

      - name: Validate ${{ inputs.environment }} kustomization targets
        uses: mikefarah/yq@master
        with:
          cmd: |
            test "$(yq '[.images[] | select(.name | test(strenv(APP_IMAGE_NAME_REGEX)))] | length' "gitops/${KUSTOMIZATION_FILE}")" -gt 0
            test "$(yq '[.patches[] | select(.target.labelSelector == strenv(VERSION_LABEL_SELECTOR))] | length' "gitops/${KUSTOMIZATION_FILE}")" -eq 1
            test "$(yq '[.patches[] | select(.target.labelSelector == strenv(VERSION_LABEL_SELECTOR)) | .patch | from_yaml | .[] | select(.path == strenv(VERSION_LABEL_PATH))] | length' "gitops/${KUSTOMIZATION_FILE}")" -eq 1

      - name: Update ${{ inputs.environment }} image tags
        uses: mikefarah/yq@master
        with:
          cmd: |
            yq -i '
              (.images[]
                | select(.name | test(strenv(APP_IMAGE_NAME_REGEX)))
                | .newTag) = strenv(IMAGE_TAG)
              |
              (.patches[]
                | select(.target.labelSelector == strenv(VERSION_LABEL_SELECTOR))
                | .patch) |= (
                  from_yaml
                  | map(
                      if .path == strenv(VERSION_LABEL_PATH) then
                        .value = strenv(IMAGE_TAG)
                      else
                        .
                      end
                    )
                  | to_yaml
                )
            ' "gitops/${KUSTOMIZATION_FILE}"

      - name: Verify ${{ inputs.environment }} kustomization update
        uses: mikefarah/yq@master
        with:
          cmd: |
            test "$(yq '[.images[] | select((.name | test(strenv(APP_IMAGE_NAME_REGEX))) and .newTag != strenv(IMAGE_TAG))] | length' "gitops/${KUSTOMIZATION_FILE}")" -eq 0
            test "$(yq '(.patches[] | select(.target.labelSelector == strenv(VERSION_LABEL_SELECTOR)) | .patch | from_yaml | .[] | select(.path == strenv(VERSION_LABEL_PATH)) | .value)' "gitops/${KUSTOMIZATION_FILE}")" = "${IMAGE_TAG}"

      - name: Show GitOps diff
        shell: bash
        run: |
          git -C gitops diff -- "${KUSTOMIZATION_FILE}"

      - name: Commit and push GitOps update
        shell: bash
        run: |
          if git -C gitops diff --quiet -- "${KUSTOMIZATION_FILE}"; then
            echo "No GitOps changes detected for ${IMAGE_TAG}"
            exit 0
          fi

          git -C gitops config user.name "github-actions[bot]"
          git -C gitops config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C gitops add "${KUSTOMIZATION_FILE}"
          git -C gitops commit -m "Update ${{ inputs.environment }} image tag to ${IMAGE_TAG}"
          git -C gitops push
